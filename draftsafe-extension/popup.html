<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <style>
    body { 
      width: 320px; 
      padding: 20px; 
      background: #0f172a; /* Deeper Obsidian */
      color: #e2e8f0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    h3 { color: #a855f7; margin-top: 0; display: flex; align-items: center; gap: 8px; }
    button { 
      background: #7c3aed; 
      color: white; 
      border: none; 
      padding: 12px; 
      width: 100%; 
      cursor: pointer; 
      border-radius: 8px; 
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
    #status { 
      margin-top: 15px; 
      font-size: 13px; 
      line-height: 1.4;
      padding: 10px;
      background: #1e293b;
      border-radius: 6px;
      border: 1px solid #334155;
    }
  </style>
</head>
<body>
  <h3>🛡️ DraftSafe Scan</h3>
  <button id="scanBtn">Scan Current Draft</button>
  <div id="status">Ready to scan...</div>
  <script src="popup.js"></script>
</body>
</html>
